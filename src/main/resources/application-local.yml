spring:
  datasource:
    url: jdbc:h2:mem:stylematch;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password: 
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true
      path: /h2-console
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml
    parameters:
      uuid_function: random_uuid()
logging:
  level:
    root: INFO
    com.stylematch: DEBUG
    org.springframework.web.cors: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web.filter.CorsFilter: DEBUG
