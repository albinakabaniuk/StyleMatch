server:
  forward-headers-strategy: framework
  port: 8080

spring:
  application:
    name: StyleMatch
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:${DATABASE_URL:postgresql://${DATABASE_HOST:localhost}:${DATABASE_PORT:5432}/${DATABASE_NAME:postgres}}}
    username: ${SPRING_DATASOURCE_USERNAME:${DATABASE_USER:postgres}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DATABASE_PASSWORD:password}}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml
    parameters:
      uuid_function: gen_random_uuid()
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  mail:
    host: ${SPRING_MAIL_HOST:localhost}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  openai:
    api-key: ${OPENAI_API_KEY:demo}
  frontend-url: ${FRONTEND_URL:http://localhost:5173}

logging:
  level:
    root: INFO
    com.stylematch: DEBUG