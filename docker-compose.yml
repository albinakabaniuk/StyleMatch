services:
  postgres:
    image: postgres:15
    container_name: stylematch-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: railway
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - stylematch-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d railway"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stylematch-network

  backend:
    build: .
    container_name: stylematch-backend
    ports:
      - "8080:8080"
    environment:
      - DATABASE_HOST=postgres
      - DATABASE_NAME=railway
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=password
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - stylematch-network

  frontend:
    build: 
      context: ./frontend
      args:
        - VITE_API_URL=/api
    container_name: stylematch-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - stylematch-network

networks:
  stylematch-network:
    driver: bridge

volumes:
  stylematch-db-data:
